<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Квест про Викторию</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Comic Neue', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #f5a0b5 0%, #e86a92 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            padding: 0 0 36px 0;
        }
        .hero-photo {
            width: 100%;
            height: 280px;
            object-fit: cover;
            object-position: center;
        }
        .content {
            padding: 24px 28px 0 28px;
        }
        h1 {
            text-align: center;
            color: #c23b6b;
            margin-top: 0;
            margin-bottom: 8px;
        }
        .sub {
            text-align: center;
            color: #e86a92;
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            color: #a52a5a;
        }
        input, button {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            border-radius: 60px;
            border: 2px solid #f0c0d0;
        }
        button {
            background: #e86a92;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #c23b6b;
        }
        .question-card {
            background: #fff5f8;
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .question-text {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #a52a5a;
            background: #ffeef4;
            padding: 12px 18px;
            border-radius: 30px;
        }
        .question-img {
            text-align: center;
            margin: 20px 0;
        }
        .question-img img {
            width: 100%;
            max-height: 350px;
            object-fit: contain;
            border-radius: 24px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }
        .option-btn {
            background: white;
            border: 2px solid #f0a0b8;
            border-radius: 60px;
            padding: 14px 20px;
            text-align: left;
            font-size: 1rem;
            font-weight: 600;
            color: #4a2035;
            cursor: pointer;
        }
        .option-btn:hover {
            background: #ffe0ea;
        }
        .rating-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
        }
        .rating-table th, .rating-table td {
            border-bottom: 1px solid #f0c0d0;
            padding: 12px 8px;
            text-align: left;
        }
        .rating-table th {
            background: #ffeef4;
            color: #a52a5a;
        }
        .rank-1 {
            background: #fff1b5;
            font-weight: bold;
        }
        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 30px;
            text-align: center;
        }
        footer {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 30px;
            color: #bbb;
        }
        .score-badge {
            background: #e86a92;
            padding: 6px 14px;
            border-radius: 40px;
            color: white;
            display: inline-block;
        }
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: #ffeef4;
            padding: 12px 20px;
            border-radius: 60px;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #e86a92;
        }
        @media (max-width: 550px) {
            .hero-photo { height: 200px; }
            .content { padding: 18px 20px 0 20px; }
            .question-text { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="loading">⏳ Загрузка...</div>
</div>

<script>
    // 👇 ТВОЯ НОВАЯ ССЫЛКА
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbywsp3rpG7QFqVfWUI99ZF-qY1t6we-MZ-wkv1AIBoGFQsofRG8t5TjzR-zWcurR1allg/exec";
    
    const QUESTIONS = [
        {
            text: "Какой год рождения у Виктории?",
            image: "dr.jpg",
            options: ["2001", "2000", "2003", "2002"],
            correct: 
        },
        {
            text: "Какое любимое блюдо Виктории?",
            image: "foot.jpg",
            options: ["раки", "ребрышки гриль", "рыба на мангале", "сладости", "хинкали"],
            correct: 0
        },
        {
            text: "Кем хотела стать Виктория в детстве?",
            image: "mechta.jpg",
            options: ["Спасателем", "Статуей свободы в США", "Учителем", "Женщиной Кошкой", "Фото-моделью"],
            correct: 2
        },
        {
            text: "Какой у Вики любимый напиток?",
            image: "napitoc.jpg",
            options: ["Зеленый смузи", "Кофейный напиток с пенкой", "Пиво", "Вода"],
            correct: 2
        }
    ];

    const BIRTHDAY_PERSON = "Виктория";
    const REGISTRATION_PHOTO = "photo_2026-05-27_20-14-07.jpg";
    
    let leaderboard = [];
    let currentPlayer = null;
    let currentQuestionIndex = 0;
    let playerScore = 0;
    let gameActive = false;
    let gameFinished = false;
    let isLoading = true;

    async function loadLeaderboard() {
        try {
            console.log("Загружаю рейтинг из:", SCRIPT_URL);
            const response = await fetch(SCRIPT_URL, {
                mode: 'cors',
                headers: {
                    'Accept': 'application/json'
                }
            });
            const data = await response.json();
            console.log("Данные из таблицы:", data);
            
            const playerScores = {};
            if (Array.isArray(data)) {
                data.forEach(entry => {
                    const name = entry.playerName;
                    const score = entry.score;
                    if (name && (!playerScores[name] || playerScores[name] < score)) {
                        playerScores[name] = score;
                    }
                });
            }
            leaderboard = Object.entries(playerScores).map(([name, score]) => ({ name, score }));
            leaderboard.sort((a,b) => b.score - a.score);
            console.log("Рейтинг загружен:", leaderboard);
        } catch(e) {
            console.error("Ошибка загрузки рейтинга:", e);
            leaderboard = [];
        }
        isLoading = false;
        render();
    }

    async function saveResult(playerName, score, totalQuestions) {
        try {
            console.log("Сохраняю результат:", { playerName, score, totalQuestions });
            const response = await fetch(SCRIPT_URL, {
                method: "POST",
                mode: 'cors',
                headers: { 
                    "Content-Type": "application/json",
                    "Accept": "application/json"
                },
                body: JSON.stringify({
                    playerName: playerName,
                    score: score,
                    totalQuestions: totalQuestions
                })
            });
            const result = await response.json();
            console.log("Результат сохранения:", result);
            return result.success === true;
        } catch(e) {
            console.error("Ошибка сохранения:", e);
            return false;
        }
    }

    function renderLeaderboard() {
        if(isLoading) return "<p>⏳ Загрузка...</p>";
        if(leaderboard.length === 0) return "<p>✨ Пока никто не прошёл квест. Будь первым! ✨</p>";
        let html = `<table class="rating-table"><tr><th>🏅 Место</th><th>Имя</th><th>⭐ Баллы</th></tr>`;
        leaderboard.forEach((player, idx) => {
            let rankClass = idx === 0 ? "rank-1" : "";
            html += `<tr class="${rankClass}"><td>${idx+1}</td><td>${player.name}</td><td>${player.score} / ${QUESTIONS.length}</td></tr>`;
        });
        html += `</table>`;
        return html;
    }

    async function render() {
        const app = document.getElementById("app");
        
        if(!currentPlayer || (gameFinished === false && gameActive === false)) {
            app.innerHTML = `
                <img class="hero-photo" src="${REGISTRATION_PHOTO}" onerror="this.src='https://placehold.co/700x280/f5a0b5/white?text=Виктория'">
                <div class="content">
                    <h1>🎂 Квест про ${BIRTHDAY_PERSON}! 🎉</h1>
                    <div class="sub">Ответь на вопросы и попади в рейтинг</div>
                    <div class="form-group">
                        <label>👋 Как тебя зовут?</label>
                        <input type="text" id="playerNameInput" placeholder="Напиши своё имя">
                    </div>
                    <button id="startGameBtn">🚀 Начать квест</button>
                    <hr style="margin: 30px 0 20px">
                    <h3>🏆 Рейтинг участников (общий)</h3>
                    ${renderLeaderboard()}
                    <footer>✨ Все результаты сохраняются в Google Таблицу ✨</footer>
                </div>
            `;
            const startBtn = document.getElementById("startGameBtn");
            const nameInput = document.getElementById("playerNameInput");
            if(startBtn) {
                startBtn.onclick = async () => {
                    const name = nameInput.value.trim();
                    if(!name) { alert("Напиши своё имя!"); return; }
                    if(leaderboard.find(p => p.name === name)) {
                        alert(`Игрок "${name}" уже проходил квест!`);
                        return;
                    }
                    currentPlayer = name;
                    currentQuestionIndex = 0;
                    playerScore = 0;
                    gameActive = true;
                    gameFinished = false;
                    render();
                };
            }
        }
        else if(gameActive === true && gameFinished === false) {
            const q = QUESTIONS[currentQuestionIndex];
            app.innerHTML = `
                <div class="content" style="padding-top:24px;">
                    <div class="player-header">
                        <span style="font-weight:bold;">🎈 ${currentPlayer}</span>
                        <span class="score-badge">⭐ ${playerScore} / ${QUESTIONS.length}</span>
                    </div>
                    <div class="question-card">
                        <div class="question-text">❓ ${q.text}</div>
                        <div class="question-img">
                            <img src="${q.image}" onerror="this.src='https://placehold.co/600x350/f5a0b5/white?text=МЕМ+ТУТ'">
                        </div>
                        <div class="options" id="optionsContainer"></div>
                    </div>
                    <div style="text-align:center; color:#a52a5a;">Вопрос ${currentQuestionIndex+1} из ${QUESTIONS.length}</div>
                </div>
            `;
            const optsDiv = document.getElementById("optionsContainer");
            if(optsDiv) {
                q.options.forEach((opt, idx) => {
                    const btn = document.createElement("button");
                    btn.innerText = opt;
                    btn.classList.add("option-btn");
                    btn.onclick = async () => {
                        if(idx === q.correct) playerScore++;
                        if(currentQuestionIndex + 1 < QUESTIONS.length) {
                            currentQuestionIndex++;
                            render();
                        } else {
                            gameFinished = true;
                            gameActive = false;
                            const saved = await saveResult(currentPlayer, playerScore, QUESTIONS.length);
                            if(saved) {
                                console.log("Результат сохранен!");
                            } else {
                                console.log("Не удалось сохранить результат");
                            }
                            await loadLeaderboard();
                            render();
                        }
                    };
                    optsDiv.appendChild(btn);
                });
            }
        }
        else if(gameFinished === true) {
            app.innerHTML = `
                <div class="content">
                    <div style="text-align:center;">
                        <h1>🎉 Поздравляем, ${currentPlayer}! 🎉</h1>
                        <div class="success">
                            Твой результат: ${playerScore} из ${QUESTIONS.length}
                        </div>
                        <button id="resetToStartBtn" style="margin-top:20px;">🔁 Главное меню</button>
                        <hr style="margin: 30px 0 20px">
                        <h3>🏆 Рейтинг всех участников</h3>
                        ${renderLeaderboard()}
                        <footer>🎂 Поделись QR-кодом с друзьями!</footer>
                    </div>
                </div>
            `;
            const resetBtn = document.getElementById("resetToStartBtn");
            if(resetBtn) {
                resetBtn.onclick = () => {
                    currentPlayer = null;
                    gameActive = false;
                    gameFinished = false;
                    render();
                };
            }
        }
    }

    loadLeaderboard();
</script>
</body>
</html>
